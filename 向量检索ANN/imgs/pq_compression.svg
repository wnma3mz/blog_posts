<svg viewBox="0 0 780 340" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="780" height="340" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Product Quantization 压缩原理</text>

  <!-- ===== Original Vector (left) ===== -->
  <text x="80" y="68" text-anchor="middle" font-size="12" fill="#475569">原始向量 (128 维, float32)</text>

  <!-- 128-dim vector represented as 8 colored sub-vector blocks side by side -->
  <!-- Sub-vector 1 -->
  <rect x="16" y="80" width="72" height="36" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="52" y="103" text-anchor="middle" font-size="11" fill="#1e40af">d₁…d₁₆</text>
  <!-- Sub-vector 2 -->
  <rect x="92" y="80" width="72" height="36" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="128" y="103" text-anchor="middle" font-size="11" fill="#1e40af">d₁₇…d₃₂</text>
  <!-- Sub-vector 3 -->
  <rect x="168" y="80" width="44" height="36" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="103" text-anchor="middle" font-size="10" fill="#1e40af">…</text>
  <!-- Sub-vector 8 (last) -->
  <rect x="216" y="80" width="72" height="36" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="252" y="103" text-anchor="middle" font-size="11" fill="#1e40af">d₁₁₃…d₁₂₈</text>

  <!-- label: 8 sub-vectors -->
  <text x="152" y="134" text-anchor="middle" font-size="11" fill="#64748b">8 个子向量（每段 16 维）</text>

  <!-- Storage label original -->
  <rect x="60" y="148" width="168" height="24" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="144" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">原始: 128 × 4 = 512 bytes</text>

  <!-- ===== Arrow down to codebooks ===== -->
  <line x1="152" y1="174" x2="152" y2="204" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="152,208 148,200 156,200" fill="#94a3b8"/>

  <!-- ===== Codebooks row ===== -->
  <text x="152" y="224" text-anchor="middle" font-size="12" fill="#475569">每段子向量 → 查最近码本中心（k-means, k=256）</text>

  <!-- 8 codebooks -->
  <!-- CB1 -->
  <rect x="16" y="232" width="56" height="44" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="1"/>
  <text x="44" y="249" text-anchor="middle" font-size="9" fill="white" font-weight="600">码本 1</text>
  <text x="44" y="263" text-anchor="middle" font-size="9" fill="#93c5fd">256 中心</text>
  <text x="44" y="275" text-anchor="middle" font-size="9" fill="#93c5fd">16×4B 每</text>
  <!-- CB2 -->
  <rect x="76" y="232" width="56" height="44" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="1"/>
  <text x="104" y="249" text-anchor="middle" font-size="9" fill="white" font-weight="600">码本 2</text>
  <text x="104" y="263" text-anchor="middle" font-size="9" fill="#93c5fd">256 中心</text>
  <text x="104" y="275" text-anchor="middle" font-size="9" fill="#93c5fd">16×4B 每</text>
  <!-- CB3 -->
  <rect x="136" y="232" width="56" height="44" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="1"/>
  <text x="164" y="249" text-anchor="middle" font-size="9" fill="white" font-weight="600">码本 3</text>
  <text x="164" y="263" text-anchor="middle" font-size="9" fill="#93c5fd">256 中心</text>
  <text x="164" y="275" text-anchor="middle" font-size="9" fill="#93c5fd">16×4B 每</text>
  <!-- dots -->
  <text x="210" y="258" font-size="18" fill="#94a3b8">…</text>
  <!-- CB8 -->
  <rect x="228" y="232" width="56" height="44" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="1"/>
  <text x="256" y="249" text-anchor="middle" font-size="9" fill="white" font-weight="600">码本 8</text>
  <text x="256" y="263" text-anchor="middle" font-size="9" fill="#93c5fd">256 中心</text>
  <text x="256" y="275" text-anchor="middle" font-size="9" fill="#93c5fd">16×4B 每</text>

  <!-- ===== Large arrow right ===== -->
  <line x1="306" y1="165" x2="370" y2="165" stroke="#475569" stroke-width="2.5"/>
  <polygon points="374,165 364,160 364,170" fill="#475569"/>
  <text x="338" y="157" text-anchor="middle" font-size="11" fill="#475569">编码</text>

  <!-- ===== Compressed code (right top) ===== -->
  <text x="530" y="68" text-anchor="middle" font-size="12" fill="#475569">压缩编码（PQ code）</text>

  <!-- 8 code bytes -->
  <rect x="390" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="410" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">42</text>
  <rect x="434" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="454" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">17</text>
  <rect x="478" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="498" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">203</text>
  <rect x="522" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="542" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">88</text>
  <rect x="566" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="586" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">5</text>
  <rect x="610" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="630" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">119</text>
  <rect x="654" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="674" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">74</text>
  <rect x="698" y="80" width="40" height="36" rx="4" fill="#6ee7b7" stroke="#059669" stroke-width="1.5"/>
  <text x="718" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">31</text>

  <text x="556" y="134" text-anchor="middle" font-size="11" fill="#64748b">8 个码字（每个 1 byte，值域 0-255）</text>

  <!-- Storage label compressed -->
  <rect x="460" y="148" width="160" height="24" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="540" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">压缩后: 8 × 1 = 8 bytes</text>

  <!-- ===== ADC Distance table ===== -->
  <rect x="390" y="210" width="360" height="100" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="570" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">ADC 查表加速距离计算</text>
  <text x="570" y="250" text-anchor="middle" font-size="11" fill="#475569">预计算: 查询子向量 q_m 与码本 m 中 256 个中心的距离</text>
  <text x="570" y="268" text-anchor="middle" font-size="11" fill="#475569">查询时: dist(q, x) ≈ Σ table_m[code_m(x)]</text>
  <text x="570" y="286" text-anchor="middle" font-size="11" fill="#475569">复杂度: O(M) 次查表，而非 O(d) 次浮点乘法</text>
  <rect x="404" y="294" width="332" height="8" rx="3" fill="#f1f5f9"/>
  <rect x="404" y="294" width="166" height="8" rx="3" fill="#86efac"/>
  <text x="570" y="316" text-anchor="middle" font-size="10" fill="#64748b">加速比约 10-30×（取决于向量维度）</text>

  <!-- ===== Compression ratio badge ===== -->
  <rect x="306" y="240" width="80" height="56" rx="8" fill="#7c3aed" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="346" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="white">64×</text>
  <text x="346" y="278" text-anchor="middle" font-size="10" fill="#ddd6fe">压缩比</text>
  <text x="346" y="291" text-anchor="middle" font-size="9" fill="#c4b5fd">512B→8B</text>
</svg>
