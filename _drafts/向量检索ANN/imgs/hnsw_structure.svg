<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="480" fill="#f9fafb" rx="12"/>
  <text x="390" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">HNSW 分层图结构与搜索路径</text>

  <!-- ============ Layer 2 (top) ============ -->
  <rect x="20" y="48" width="580" height="96" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="38" y="68" font-size="12" font-weight="600" fill="#3730a3">Layer 2  —  稀疏长跳跃层</text>

  <!-- Layer 2 nodes: A(entry), B, C, D -->
  <circle cx="110" cy="102" r="18" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/>
  <text x="110" y="107" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">A</text>

  <circle cx="240" cy="102" r="16" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="240" y="107" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">B</text>

  <circle cx="370" cy="88" r="16" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="370" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">C</text>

  <circle cx="480" cy="102" r="16" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="480" y="107" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">D</text>

  <!-- Layer 2 edges -->
  <line x1="128" y1="102" x2="224" y2="102" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="256" y1="96" x2="354" y2="90" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="386" y1="92" x2="464" y2="98" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="128" y1="98" x2="462" y2="98" stroke="#818cf8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Entry point label -->
  <text x="110" y="76" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">入口节点</text>
  <line x1="110" y1="78" x2="110" y2="84" stroke="#dc2626" stroke-width="1"/>

  <!-- ============ Layer 1 (middle) ============ -->
  <rect x="20" y="156" width="580" height="116" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="38" y="176" font-size="12" font-weight="600" fill="#0c4a6e">Layer 1  —  中间层</text>

  <circle cx="80"  cy="214" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="80"  y="219" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">a</text>

  <circle cx="170" cy="200" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="170" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">b</text>

  <circle cx="255" cy="220" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="255" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">c</text>

  <circle cx="340" cy="204" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="340" y="209" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">d</text>

  <circle cx="415" cy="220" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="415" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">e</text>

  <circle cx="490" cy="200" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="490" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">f</text>

  <circle cx="550" cy="222" r="15" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <text x="550" y="227" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">g</text>

  <!-- Layer 1 edges -->
  <line x1="95"  y1="212" x2="155" y2="203" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="185" y1="204" x2="240" y2="216" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="270" y1="216" x2="325" y2="207" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="355" y1="207" x2="400" y2="216" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="430" y1="216" x2="475" y2="203" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="505" y1="203" x2="535" y2="218" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="95"  y1="218" x2="240" y2="220" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="355" y1="210" x2="475" y2="205" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ Layer 0 (bottom, dense) ============ -->
  <rect x="20" y="284" width="580" height="160" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="38" y="304" font-size="12" font-weight="600" fill="#14532d">Layer 0  —  密集底层（精细搜索）</text>

  <!-- row 1 -->
  <circle cx="58"  cy="332" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="58"  y="337" text-anchor="middle" font-size="10" fill="#14532d">n1</text>
  <circle cx="108" cy="320" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="108" y="325" text-anchor="middle" font-size="10" fill="#14532d">n2</text>
  <circle cx="160" cy="336" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="160" y="341" text-anchor="middle" font-size="10" fill="#14532d">n3</text>
  <circle cx="210" cy="318" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="210" y="323" text-anchor="middle" font-size="10" fill="#14532d">n4</text>
  <circle cx="260" cy="334" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="339" text-anchor="middle" font-size="10" fill="#14532d">n5</text>
  <circle cx="310" cy="320" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="325" text-anchor="middle" font-size="10" fill="#14532d">n6</text>
  <circle cx="360" cy="336" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="360" y="341" text-anchor="middle" font-size="10" fill="#14532d">n7</text>

  <!-- row 2 -->
  <circle cx="83"  cy="390" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="83"  y="395" text-anchor="middle" font-size="10" fill="#14532d">n8</text>
  <circle cx="135" cy="374" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="135" y="379" text-anchor="middle" font-size="10" fill="#14532d">n9</text>
  <circle cx="188" cy="392" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="188" y="397" text-anchor="middle" font-size="10" fill="#14532d">n10</text>
  <circle cx="240" cy="376" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="381" text-anchor="middle" font-size="10" fill="#14532d">n11</text>
  <circle cx="290" cy="392" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="290" y="397" text-anchor="middle" font-size="10" fill="#14532d">n12</text>
  <!-- target node -->
  <circle cx="340" cy="376" r="15" fill="#fde68a" stroke="#d97706" stroke-width="2.5"/>
  <text x="340" y="381" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">★</text>
  <circle cx="410" cy="352" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="410" y="357" text-anchor="middle" font-size="10" fill="#14532d">n13</text>
  <circle cx="470" cy="380" r="13" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="470" y="385" text-anchor="middle" font-size="10" fill="#14532d">n14</text>

  <!-- Layer 0 edges (dense) -->
  <line x1="71"  y1="328" x2="95"  y2="324" stroke="#86efac" stroke-width="1.2"/>
  <line x1="121" y1="323" x2="147" y2="329" stroke="#86efac" stroke-width="1.2"/>
  <line x1="173" y1="330" x2="197" y2="321" stroke="#86efac" stroke-width="1.2"/>
  <line x1="223" y1="321" x2="247" y2="328" stroke="#86efac" stroke-width="1.2"/>
  <line x1="273" y1="328" x2="297" y2="322" stroke="#86efac" stroke-width="1.2"/>
  <line x1="323" y1="324" x2="347" y2="330" stroke="#86efac" stroke-width="1.2"/>
  <line x1="71"  y1="336" x2="96"  y2="382" stroke="#86efac" stroke-width="1.2"/>
  <line x1="96"  y1="382" x2="122" y2="370" stroke="#86efac" stroke-width="1.2"/>
  <line x1="148" y1="373" x2="175" y2="386" stroke="#86efac" stroke-width="1.2"/>
  <line x1="201" y1="386" x2="227" y2="374" stroke="#86efac" stroke-width="1.2"/>
  <line x1="253" y1="374" x2="277" y2="386" stroke="#86efac" stroke-width="1.2"/>
  <line x1="303" y1="388" x2="325" y2="374" stroke="#86efac" stroke-width="1.2"/>
  <line x1="355" y1="373" x2="397" y2="356" stroke="#86efac" stroke-width="1.2"/>
  <line x1="423" y1="356" x2="457" y2="374" stroke="#86efac" stroke-width="1.2"/>
  <line x1="323" y1="332" x2="303" y2="386" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="253" y1="328" x2="226" y2="373" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Target label -->
  <text x="340" y="415" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">查询最近邻</text>

  <!-- ============ Search path arrows (red) ============ -->
  <!-- L2: A -> D (greedy long jump) -->
  <line x1="128" y1="100" x2="462" y2="100" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <!-- L2 -> L1 descent (D down to f) -->
  <line x1="480" y1="118" x2="490" y2="185" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <!-- L1: f -> e -->
  <line x1="475" y1="210" x2="430" y2="216" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <!-- L1: e -> d -->
  <line x1="400" y1="216" x2="355" y2="207" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <!-- L1 -> L0 descent (d down to n7) -->
  <line x1="340" y1="219" x2="355" y2="320" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <!-- L0: n7 -> target -->
  <line x1="347" y1="344" x2="342" y2="361" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- ============ Right annotation panel ============ -->
  <rect x="616" y="48" width="148" height="396" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="690" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">参数说明</text>

  <!-- M -->
  <rect x="628" y="80" width="124" height="54" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="640" y="97" font-size="10" font-weight="600" fill="#5b21b6">M（连接数）</text>
  <text x="640" y="112" font-size="9" fill="#6d28d9">每层每节点保留的</text>
  <text x="640" y="124" font-size="9" fill="#6d28d9">近邻数，典型 16–64</text>

  <!-- ef_construction -->
  <rect x="628" y="142" width="124" height="54" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="159" font-size="10" font-weight="600" fill="#92400e">ef_construction</text>
  <text x="640" y="174" font-size="9" fill="#b45309">构建时动态候选集</text>
  <text x="640" y="186" font-size="9" fill="#b45309">大小，影响构建质量</text>

  <!-- ef_search -->
  <rect x="628" y="204" width="124" height="54" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="640" y="221" font-size="10" font-weight="600" fill="#065f46">ef_search</text>
  <text x="640" y="236" font-size="9" fill="#047857">查询时候选集大小</text>
  <text x="640" y="248" font-size="9" fill="#047857">精度 / 速度调节旋钮</text>

  <!-- tradeoff -->
  <rect x="628" y="266" width="124" height="78" rx="4" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
  <text x="640" y="283" font-size="10" font-weight="600" fill="#9f1239">权衡</text>
  <text x="640" y="298" font-size="9" fill="#be123c">↑M → 更高 recall</text>
  <text x="640" y="311" font-size="9" fill="#be123c">     但内存更大</text>
  <text x="640" y="326" font-size="9" fill="#be123c">↑ef → 更高 recall</text>
  <text x="640" y="339" font-size="9" fill="#be123c">     但查询更慢</text>

  <!-- complexity note -->
  <rect x="628" y="352" width="124" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="640" y="369" font-size="10" font-weight="600" fill="#334155">搜索复杂度</text>
  <text x="640" y="384" font-size="9" fill="#475569">O(log N) 层间跳跃</text>
  <text x="640" y="397" font-size="9" fill="#475569">+ O(ef · M) 底层</text>
  <text x="640" y="410" font-size="9" fill="#475569">实测远快于 IVF-PQ</text>

</svg>
