<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="420" fill="#f9fafb" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">DiskANN 两阶段搜索</text>

  <!-- ==================== Memory zone ==================== -->
  <rect x="20" y="52" width="340" height="180" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <!-- Memory chip icon -->
  <rect x="36" y="68" width="18" height="18" rx="2" fill="#fb923c"/>
  <text x="45" y="81" text-anchor="middle" font-size="9" fill="white" font-weight="700">M</text>
  <text x="140" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">内存（RAM）</text>
  <text x="140" y="98" text-anchor="middle" font-size="10" fill="#9a3412">PQ 压缩向量 + Vamana 图结构</text>

  <!-- PQ compressed graph visualization -->
  <!-- Small compressed blocks representing PQ vectors -->
  <text x="36" y="122" font-size="10" fill="#c2410c" font-weight="600">PQ 压缩图节点：</text>
  <!-- Node blocks (compact) -->
  <rect x="36"  y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="50"  y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <rect x="68"  y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="82"  y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <rect x="100" y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="114" y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <rect x="132" y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="146" y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <rect x="164" y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="178" y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <rect x="196" y="130" width="28" height="16" rx="3" fill="#fed7aa" stroke="#fb923c" stroke-width="1"/>
  <text x="210" y="142" text-anchor="middle" font-size="8" fill="#7c2d12">8B</text>
  <text x="234" y="142" font-size="10" fill="#9a3412">…</text>

  <!-- Mini graph edges -->
  <circle cx="60"  cy="176" r="10" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="60"  y="180" text-anchor="middle" font-size="8" fill="#7c2d12">v1</text>
  <circle cx="110" cy="168" r="10" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="110" y="172" text-anchor="middle" font-size="8" fill="#7c2d12">v2</text>
  <circle cx="160" cy="180" r="10" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="160" y="184" text-anchor="middle" font-size="8" fill="#7c2d12">v3</text>
  <circle cx="200" cy="168" r="10" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="200" y="172" text-anchor="middle" font-size="8" fill="#7c2d12">v4</text>
  <circle cx="240" cy="176" r="10" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5"/>
  <text x="240" y="180" text-anchor="middle" font-size="8" fill="#7c2d12">v5</text>
  <line x1="70" y1="174" x2="100" y2="170" stroke="#fb923c" stroke-width="1.2"/>
  <line x1="120" y1="170" x2="150" y2="176" stroke="#fb923c" stroke-width="1.2"/>
  <line x1="170" y1="178" x2="190" y2="171" stroke="#fb923c" stroke-width="1.2"/>
  <line x1="210" y1="170" x2="230" y2="174" stroke="#fb923c" stroke-width="1.2"/>
  <line x1="70" y1="176" x2="230" y2="175" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="180" y="210" text-anchor="middle" font-size="10" fill="#9a3412">每节点仅 8 bytes (PQ) + 邻居列表</text>
  <text x="180" y="224" text-anchor="middle" font-size="10" fill="#9a3412">全部常驻内存，约 8-16 GB / 10亿向量</text>

  <!-- ==================== SSD zone ==================== -->
  <!-- SSD icon -->
  <rect x="400" y="52" width="340" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <!-- SSD icon -->
  <rect x="416" y="68" width="18" height="18" rx="2" fill="#3b82f6"/>
  <text x="425" y="81" text-anchor="middle" font-size="9" fill="white" font-weight="700">SSD</text>
  <text x="560" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">磁盘（SSD）</text>
  <text x="560" y="98" text-anchor="middle" font-size="10" fill="#1e40af">原始全精度向量（float32）</text>

  <!-- Full vectors on disk -->
  <text x="416" y="122" font-size="10" fill="#1d4ed8" font-weight="600">原始向量块（按节点 ID 分页存储）：</text>

  <!-- Vector blocks - larger, representing full float32 vectors -->
  <rect x="416" y="130" width="56" height="20" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="444" y="144" text-anchor="middle" font-size="8" fill="#1e40af">v1: 512B</text>
  <rect x="476" y="130" width="56" height="20" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="504" y="144" text-anchor="middle" font-size="8" fill="#1e40af">v2: 512B</text>
  <rect x="536" y="130" width="56" height="20" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="564" y="144" text-anchor="middle" font-size="8" fill="#1e40af">v3: 512B</text>
  <rect x="596" y="130" width="56" height="20" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="624" y="144" text-anchor="middle" font-size="8" fill="#1e40af">v4: 512B</text>
  <text x="664" y="144" font-size="10" fill="#1e40af">…</text>

  <!-- disk page illustration -->
  <rect x="416" y="158" width="304" height="48" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="568" y="174" text-anchor="middle" font-size="10" fill="#1e40af">顺序布局：每页包含节点向量 + 邻居列表</text>
  <text x="568" y="190" text-anchor="middle" font-size="10" fill="#1e40af">Vamana 图设计减少随机 IO 跳跃次数</text>

  <text x="568" y="218" text-anchor="middle" font-size="10" fill="#1e40af">总容量：1B × 512B ≈ 512 GB，需大容量 SSD</text>
  <text x="568" y="232" text-anchor="middle" font-size="10" fill="#1e40af">IO 放大比优于 HNSW 磁盘化方案</text>

  <!-- ==================== Query input ==================== -->
  <rect x="310" y="52" width="80" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="350" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">查询向量</text>
  <text x="350" y="84" text-anchor="middle" font-size="10" fill="#166534">q ∈ ℝ¹²⁸</text>

  <!-- Query -> Memory arrow -->
  <line x1="310" y1="70" x2="362" y2="100" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ==================== Phase 1 ==================== -->
  <!-- Phase 1 box -->
  <rect x="20" y="250" width="340" height="80" rx="8" fill="#fff" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="272" font-size="11" font-weight="700" fill="#c2410c">阶段 1：PQ 图贪心搜索（纯内存）</text>
  <text x="36" y="290" font-size="10" fill="#9a3412">用压缩向量近似距离，在图上贪心游走</text>
  <text x="36" y="306" font-size="10" fill="#9a3412">筛选出 top-C 候选集（C 约为最终 K 的 4-10 倍）</text>
  <!-- No IO badge -->
  <rect x="246" y="264" width="100" height="22" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="296" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">零磁盘 IO</text>

  <!-- Phase 1 label arrow -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Memory -> Phase1 -->
  <line x1="190" y1="232" x2="190" y2="248" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ==================== Phase 2 ==================== -->
  <rect x="400" y="250" width="340" height="80" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="416" y="272" font-size="11" font-weight="700" fill="#1d4ed8">阶段 2：原始向量精确重排序（SSD IO）</text>
  <text x="416" y="290" font-size="10" fill="#1e40af">从 SSD 加载候选集的原始 float32 向量</text>
  <text x="416" y="306" font-size="10" fill="#1e40af">计算精确距离，返回真实 top-K</text>
  <!-- Few IO badge -->
  <rect x="622" y="264" width="104" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="674" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">少量顺序 IO</text>

  <!-- Phase1 -> SSD -->
  <line x1="360" y1="290" x2="398" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="379" y="284" text-anchor="middle" font-size="9" fill="#2563eb">候选集</text>

  <!-- SSD zone -> Phase2 -->
  <line x1="570" y1="232" x2="570" y2="248" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ==================== Final result ==================== -->
  <rect x="250" y="360" width="260" height="44" rx="8" fill="#581c87" stroke="#7c3aed" stroke-width="2"/>
  <text x="380" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="white">最终结果 Top-K</text>
  <text x="380" y="396" text-anchor="middle" font-size="10" fill="#e9d5ff">精确排序的最近邻向量 ID + 距离</text>

  <!-- Phase2 -> Result -->
  <line x1="570" y1="330" x2="460" y2="358" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <!-- Phase1 also feeds result indirectly -->
  <line x1="190" y1="330" x2="300" y2="358" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ==================== Performance stats ==================== -->
  <rect x="20" y="344" width="200" height="68" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="362" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">实测性能（1B 向量）</text>
  <text x="30" y="378" font-size="9" fill="#166534">数据集：1 Billion SIFT</text>
  <text x="30" y="392" font-size="9" fill="#166534">硬件：64GB RAM + NVMe SSD</text>
  <text x="30" y="406" font-size="9" fill="#166534">延迟: ~5ms，Recall@10 &gt; 95%</text>

  <rect x="540" y="344" width="200" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="640" y="362" text-anchor="middle" font-size="10" font-weight="700" fill="#3b0764">对比 HNSW</text>
  <text x="550" y="378" font-size="9" fill="#6b21a8">HNSW (1B): 需 ~1TB 内存</text>
  <text x="550" y="392" font-size="9" fill="#6b21a8">DiskANN: 64GB RAM + SSD</text>
  <text x="550" y="406" font-size="9" fill="#6b21a8">内存节省 &gt; 15×，延迟相当</text>
</svg>
