<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="720" height="360" fill="#fafafa" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">推理感知的最优训练：推理量越大，最优模型越小</text>

  <!-- ===== Left: Illustration ===== -->
  <!-- Three iso-compute curves for different Q values -->
  <!-- Axes -->
  <line x1="60" y1="280" x2="320" y2="280" stroke="#bbb" stroke-width="1.5"/>
  <line x1="60" y1="60" x2="60" y2="280" stroke="#bbb" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="190" y="300" text-anchor="middle" font-size="11" fill="#888">模型参数量 N →</text>
  <text x="20" y="170" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,20,170)">推理总成本 →</text>

  <!-- Total cost = C_train(N,D*) + Q * C_inf(N) -->
  <!-- C_train ∝ N·D ≈ N^1 (fixed budget) so training cost decreases as N grows (more param = fewer tokens needed)
       C_inf ∝ N * Q (per-query proportional to N)
       For small Q: training cost dominates → bigger N OK
       For large Q: inference dominates → smaller N preferred -->

  <!-- Q small (e.g. Q=1000): nearly flat, optimum at larger N -->
  <polyline fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"
    points="70,240 100,200 130,175 160,165 190,162 220,164 250,172 280,185 310,202"/>
  <!-- Optimal marked -->
  <circle cx="190" cy="162" r="5" fill="#4A90D9"/>
  <line x1="190" y1="162" x2="190" y2="280" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="190" y="293" text-anchor="middle" font-size="10" fill="#4A90D9">N*₁</text>

  <!-- Q medium (e.g. Q=100K): optimum shifts left -->
  <polyline fill="none" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"
    points="70,225 100,188 130,162 160,148 190,145 220,151 250,163 280,180 310,200"/>
  <circle cx="175" cy="146" r="5" fill="#27AE60"/>
  <line x1="175" y1="146" x2="175" y2="280" stroke="#27AE60" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="175" y="293" text-anchor="middle" font-size="10" fill="#27AE60">N*₂</text>

  <!-- Wait, let's redesign: x=param size 1B..100B, y=total cost
       Small Q: U shape with min near large N
       Large Q: min near small N -->
  <!-- Actually redraw clearly:
       x=small N left, large N right
       Cost curves that shift -->

  <!-- Q large (e.g. Q=10M): curve minimum at much smaller N -->
  <polyline fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round"
    points="70,200 100,168 130,148 160,142 190,146 220,158 250,176 280,198 310,223"/>
  <circle cx="155" cy="141" r="5" fill="#E67E22"/>
  <line x1="155" y1="141" x2="155" y2="280" stroke="#E67E22" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="155" y="293" text-anchor="middle" font-size="10" fill="#E67E22">N*₃</text>

  <!-- Arrow showing N* shift -->
  <path d="M190,250 L155,250" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="172" y="266" text-anchor="middle" font-size="10" fill="#555">Q↑ → N*↓</text>

  <!-- Legend left -->
  <rect x="55" y="68" width="165" height="66" rx="6" fill="white" stroke="#eee"/>
  <line x1="66" y1="84" x2="96" y2="84" stroke="#4A90D9" stroke-width="2.5"/>
  <text x="102" y="88" font-size="11" fill="#333">Q 小（少量推理）</text>
  <line x1="66" y1="101" x2="96" y2="101" stroke="#27AE60" stroke-width="2.5"/>
  <text x="102" y="105" font-size="11" fill="#333">Q 中</text>
  <line x1="66" y1="118" x2="96" y2="118" stroke="#E67E22" stroke-width="2.5"/>
  <text x="102" y="122" font-size="11" fill="#333">Q 大（大量推理）</text>

  <!-- Divider -->
  <line x1="360" y1="55" x2="360" y2="340" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== Right: Real Example ===== -->
  <text x="540" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#555">实际案例：训练 token 数的选择</text>

  <!-- Table -->
  <!-- Header -->
  <rect x="375" y="74" width="320" height="30" rx="4" fill="#EBF5FB"/>
  <text x="420" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">模型</text>
  <text x="508" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">参数</text>
  <text x="580" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">训练 Tokens</text>
  <text x="665" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">tokens/param</text>

  <!-- Grid lines -->
  <line x1="375" y1="104" x2="695" y2="104" stroke="#eee" stroke-width="1"/>
  <line x1="375" y1="128" x2="695" y2="128" stroke="#eee" stroke-width="1"/>
  <line x1="375" y1="152" x2="695" y2="152" stroke="#eee" stroke-width="1"/>
  <line x1="375" y1="176" x2="695" y2="176" stroke="#eee" stroke-width="1"/>
  <line x1="375" y1="200" x2="695" y2="200" stroke="#eee" stroke-width="1"/>
  <line x1="375" y1="224" x2="695" y2="224" stroke="#eee" stroke-width="1"/>
  <line x1="460" y1="74" x2="460" y2="248" stroke="#eee" stroke-width="1"/>
  <line x1="548" y1="74" x2="548" y2="248" stroke="#eee" stroke-width="1"/>
  <line x1="628" y1="74" x2="628" y2="248" stroke="#eee" stroke-width="1"/>
  <rect x="375" y="74" width="320" height="174" rx="4" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Chinchilla optimal row -->
  <rect x="376" y="105" width="318" height="22" rx="2" fill="#FFF3CD"/>
  <text x="420" y="120" text-anchor="middle" font-size="11" fill="#555">Chinchilla</text>
  <text x="508" y="120" text-anchor="middle" font-size="11" fill="#555">70B</text>
  <text x="580" y="120" text-anchor="middle" font-size="11" fill="#555">1.4T</text>
  <text x="665" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#856404">20×  ✓</text>

  <!-- GPT-3 -->
  <text x="420" y="144" text-anchor="middle" font-size="11" fill="#555">GPT-3</text>
  <text x="508" y="144" text-anchor="middle" font-size="11" fill="#555">175B</text>
  <text x="580" y="144" text-anchor="middle" font-size="11" fill="#555">300B</text>
  <text x="665" y="144" text-anchor="middle" font-size="11" fill="#E74C3C">1.7×  ↓↓</text>

  <!-- LLaMA 3 8B -->
  <rect x="376" y="153" width="318" height="22" rx="2" fill="#E9F7EF"/>
  <text x="420" y="168" text-anchor="middle" font-size="11" fill="#555">LLaMA 3-8B</text>
  <text x="508" y="168" text-anchor="middle" font-size="11" fill="#555">8B</text>
  <text x="580" y="168" text-anchor="middle" font-size="11" fill="#555">15T</text>
  <text x="665" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#1e8449">1875×  ↑</text>

  <!-- LLaMA 2 7B -->
  <text x="420" y="192" text-anchor="middle" font-size="11" fill="#555">LLaMA 2-7B</text>
  <text x="508" y="192" text-anchor="middle" font-size="11" fill="#555">7B</text>
  <text x="580" y="192" text-anchor="middle" font-size="11" fill="#555">2T</text>
  <text x="665" y="192" text-anchor="middle" font-size="11" fill="#4A90D9">286×  ↑</text>

  <!-- DeepSeek V3 -->
  <rect x="376" y="201" width="318" height="22" rx="2" fill="#E9F7EF"/>
  <text x="420" y="216" text-anchor="middle" font-size="11" fill="#555">DeepSeek-V3</text>
  <text x="508" y="216" text-anchor="middle" font-size="11" fill="#555">37B*</text>
  <text x="580" y="216" text-anchor="middle" font-size="11" fill="#555">14.8T</text>
  <text x="665" y="216" text-anchor="middle" font-size="11" fill="#4A90D9">400×  ↑</text>

  <text x="388" y="240" font-size="9" fill="#aaa">* 37B 为 DeepSeek-V3 活跃参数量</text>

  <!-- Explanation box -->
  <rect x="375" y="255" width="320" height="72" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="535" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5276">为什么超训练有意义？</text>
  <text x="535" y="289" text-anchor="middle" font-size="11" fill="#2c3e50">推理量 Q 足够大时，多花训练成本</text>
  <text x="535" y="305" text-anchor="middle" font-size="11" fill="#2c3e50">换取小模型低推理代价，总体更划算。</text>
  <text x="535" y="320" text-anchor="middle" font-size="11" fill="#4A90D9">Scaling Laws for Inference（2024）</text>

  <defs>
    <marker id="as" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
