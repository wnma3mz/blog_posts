<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="720" height="400" fill="#fafafa" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">优化器演进：收敛速度 vs 内存开销</text>

  <!-- ===== Left: Convergence curves ===== -->
  <text x="188" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#555">收敛曲线（相同步数下的 Loss）</text>

  <!-- Axes -->
  <line x1="60" y1="295" x2="330" y2="295" stroke="#bbb" stroke-width="1.5"/>
  <line x1="60" y1="70" x2="60" y2="295" stroke="#bbb" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="195" y="315" text-anchor="middle" font-size="11" fill="#888">训练步数</text>
  <text x="25" y="185" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,25,185)">Loss</text>

  <!-- Y ticks -->
  <text x="55" y="290" text-anchor="end" font-size="10" fill="#aaa">high</text>
  <text x="55" y="180" text-anchor="end" font-size="10" fill="#aaa">mid</text>
  <text x="55" y="90" text-anchor="end" font-size="10" fill="#aaa">low</text>

  <!-- Adam/AdamW curve -->
  <polyline fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"
    points="65,280 90,240 120,210 155,188 190,172 225,160 260,151 295,145 325,141"/>

  <!-- Sophia curve (faster) -->
  <polyline fill="none" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"
    points="65,280 88,228 115,194 148,170 182,152 218,139 255,128 292,120 325,114"/>

  <!-- SGD curve (slower) -->
  <polyline fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"
    points="65,280 95,258 130,238 168,222 206,208 244,196 280,185 316,175 325,172"/>

  <!-- Apollo curve (close to AdamW) -->
  <polyline fill="none" stroke="#8E44AD" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 2"
    points="65,280 91,242 121,213 156,190 191,174 226,162 261,153 296,146 325,142"/>

  <!-- Convergence gap annotation -->
  <line x1="325" y1="114" x2="325" y2="141" stroke="#555" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="320" y1="114" x2="330" y2="114" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="141" x2="330" y2="141" stroke="#555" stroke-width="1"/>
  <text x="335" y="130" font-size="10" fill="#555">~2×</text>
  <text x="335" y="143" font-size="9" fill="#555">优势</text>

  <!-- Legend left -->
  <rect x="64" y="306" width="260" height="75" rx="6" fill="white" stroke="#eee"/>
  <line x1="75" y1="320" x2="105" y2="320" stroke="#4A90D9" stroke-width="2.5"/>
  <text x="112" y="324" font-size="11" fill="#333">AdamW（标准基线）</text>
  <line x1="75" y1="337" x2="105" y2="337" stroke="#27AE60" stroke-width="2.5"/>
  <text x="112" y="341" font-size="11" fill="#333">Sophia（约 2× 步骤减少）</text>
  <line x1="75" y1="354" x2="105" y2="354" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="112" y="358" font-size="11" fill="#333">Apollo（接近 AdamW）</text>
  <line x1="75" y1="371" x2="105" y2="371" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="112" y="375" font-size="11" fill="#333">SGD（无自适应）</text>

  <!-- Divider -->
  <line x1="360" y1="55" x2="360" y2="390" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== Right: Memory vs Speed Trade-off ===== -->
  <text x="540" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#555">内存开销 vs 收敛速度对比</text>

  <!-- Bubble chart: x=memory (1x~4x), y=convergence speed (1=slow, 5=fast) -->
  <!-- Axes -->
  <line x1="390" y1="290" x2="680" y2="290" stroke="#bbb" stroke-width="1.5"/>
  <line x1="390" y1="75" x2="390" y2="290" stroke="#bbb" stroke-width="1.5"/>

  <!-- X axis labels -->
  <text x="540" y="310" text-anchor="middle" font-size="11" fill="#888">内存开销（相对于 SGD）</text>
  <text x="420" y="305" text-anchor="middle" font-size="10" fill="#aaa">1×</text>
  <text x="470" y="305" text-anchor="middle" font-size="10" fill="#aaa">2×</text>
  <text x="520" y="305" text-anchor="middle" font-size="10" fill="#aaa">3×</text>
  <text x="570" y="305" text-anchor="middle" font-size="10" fill="#aaa">4×</text>
  <text x="620" y="305" text-anchor="middle" font-size="10" fill="#aaa">6×</text>
  <text x="660" y="305" text-anchor="middle" font-size="10" fill="#aaa">8×</text>

  <!-- Y axis labels -->
  <text x="380" y="285" text-anchor="end" font-size="10" fill="#aaa">慢</text>
  <text x="380" y="175" text-anchor="end" font-size="10" fill="#aaa">中</text>
  <text x="380" y="80" text-anchor="end" font-size="10" fill="#aaa">快</text>

  <!-- SGD: memory 1x, speed slow → (420, 280) -->
  <circle cx="420" cy="272" r="16" fill="#E74C3C" opacity="0.8"/>
  <text x="420" y="276" text-anchor="middle" font-size="9" fill="white">SGD</text>

  <!-- Adam: memory ~3x, speed medium → (520, 190) -->
  <circle cx="520" cy="188" r="18" fill="#4A90D9" opacity="0.85"/>
  <text x="520" y="192" text-anchor="middle" font-size="9" fill="white">Adam</text>

  <!-- AdamW: memory ~3x, speed medium+ → (520, 178) -->
  <circle cx="518" cy="170" r="18" fill="#2980B9" opacity="0.85"/>
  <text x="518" y="174" text-anchor="middle" font-size="9" fill="white">AdamW</text>

  <!-- Apollo: memory ~1.5x, speed ~ AdamW → (455, 172) -->
  <circle cx="455" cy="172" r="16" fill="#8E44AD" opacity="0.85"/>
  <text x="455" y="176" text-anchor="middle" font-size="9" fill="white">Apollo</text>

  <!-- 8-bit AdamW: memory ~1.5x, speed ≈ AdamW → (455, 178) -->
  <circle cx="455" cy="196" r="14" fill="#1ABC9C" opacity="0.85"/>
  <text x="455" y="200" text-anchor="middle" font-size="8" fill="white">8-bit</text>

  <!-- Sophia: memory ~3x, speed fast → (520, 110) -->
  <circle cx="520" cy="108" r="18" fill="#27AE60" opacity="0.85"/>
  <text x="520" y="112" text-anchor="middle" font-size="9" fill="white">Sophia</text>

  <!-- Shampoo: memory ~6x, speed fast → (620, 115) -->
  <circle cx="620" cy="120" r="18" fill="#E67E22" opacity="0.85"/>
  <text x="620" y="124" text-anchor="middle" font-size="9" fill="white">Shampoo</text>

  <!-- SOAP: memory ~5x, speed fast+ → (588, 100) -->
  <circle cx="588" cy="98" r="16" fill="#C0392B" opacity="0.85"/>
  <text x="588" y="102" text-anchor="middle" font-size="9" fill="white">SOAP</text>

  <!-- Ideal zone annotation -->
  <rect x="395" y="80" width="115" height="120" rx="6" fill="none" stroke="#F0AD4E" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="452" y="75" text-anchor="middle" font-size="10" fill="#856404">理想区间</text>
  <text x="452" y="66" text-anchor="middle" font-size="9" fill="#aaa">低内存 + 快收敛</text>

  <!-- Arrow pointing to ideal zone -->
  <path d="M452,73 L452,80" stroke="#F0AD4E" stroke-width="1.5" marker-end="url(#af)"/>

  <defs>
    <marker id="af" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M1,1 L5,3 L1,5 Z" fill="#F0AD4E"/>
    </marker>
  </defs>
</svg>
