<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="700" height="360" fill="#fafafa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">Chinchilla 最优训练法则：计算预算如何分配给模型与数据</text>

  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M1,1 L6,3.5 L1,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- Left panel: N_opt vs C  (x: 55–320, y: 55–270) -->
  <!-- ============================================================ -->
  <text x="188" y="54" text-anchor="middle" font-size="12" font-weight="600" fill="#444">最优参数量 N_opt 随计算量 C 的变化</text>

  <!-- axes -->
  <line x1="60" y1="268" x2="318" y2="268" stroke="#ccc" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="60" y1="268" x2="60"  y2="60"  stroke="#ccc" stroke-width="1.4" marker-end="url(#arr2)"/>

  <!-- axis labels -->
  <text x="188" y="286" text-anchor="middle" font-size="10" fill="#888">log 计算量 C（FLOPs）</text>
  <text x="20"  y="165" text-anchor="middle" font-size="10" fill="#888" transform="rotate(-90,20,165)">log 最优参数量 N_opt</text>

  <!-- x ticks -->
  <line x1="100" y1="268" x2="100" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="155" y1="268" x2="155" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="210" y1="268" x2="210" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="265" y1="268" x2="265" y2="272" stroke="#ccc" stroke-width="1"/>
  <text x="100" y="280" text-anchor="middle" font-size="9" fill="#aaa">10¹⁹</text>
  <text x="155" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²⁰</text>
  <text x="210" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²¹</text>
  <text x="265" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²²</text>

  <!-- y ticks -->
  <line x1="56" y1="230" x2="60" y2="230" stroke="#ccc" stroke-width="1"/>
  <line x1="56" y1="175" x2="60" y2="175" stroke="#ccc" stroke-width="1"/>
  <line x1="56" y1="120" x2="60" y2="120" stroke="#ccc" stroke-width="1"/>
  <text x="54" y="234" text-anchor="end" font-size="9" fill="#aaa">10⁸</text>
  <text x="54" y="179" text-anchor="end" font-size="9" fill="#aaa">10⁹</text>
  <text x="54" y="124" text-anchor="end" font-size="9" fill="#aaa">10¹⁰</text>

  <!-- grid -->
  <line x1="60" y1="230" x2="315" y2="230" stroke="#ebebeb" stroke-width="1"/>
  <line x1="60" y1="175" x2="315" y2="175" stroke="#ebebeb" stroke-width="1"/>
  <line x1="60" y1="120" x2="315" y2="120" stroke="#ebebeb" stroke-width="1"/>

  <!-- Kaplan N_opt ~ C^0.73 (steeper) -->
  <!-- slope 0.73: per 55px (1 decade in x), y rises 0.73 * 55px = 40.2px -->
  <polyline fill="none" stroke="#E74C3C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="7 3"
    points="100,248 155,208 210,168 265,128"/>

  <!-- Chinchilla N_opt ~ C^0.5 (shallower) -->
  <!-- slope 0.5: per 55px, y rises 27.5px -->
  <polyline fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="100,248 155,220 210,193 265,165"/>

  <!-- GPT-3 point -->
  <circle cx="228" cy="160" r="6" fill="#E74C3C" opacity="0.9"/>
  <text x="235" y="156" font-size="9" fill="#E74C3C">GPT-3 175B</text>
  <text x="235" y="167" font-size="9" fill="#E74C3C">（训练不足）</text>

  <!-- Chinchilla point -->
  <circle cx="200" cy="198" r="6" fill="#27AE60" opacity="0.9"/>
  <text x="207" y="194" font-size="9" fill="#27AE60">Chinchilla 70B</text>
  <text x="207" y="205" font-size="9" fill="#27AE60">（计算最优）</text>

  <!-- slope labels -->
  <text x="270" y="124" font-size="10" fill="#E74C3C">斜率 0.73</text>
  <text x="270" y="161" font-size="10" fill="#4A90D9">斜率 0.5</text>

  <!-- ============================================================ -->
  <!-- Divider -->
  <!-- ============================================================ -->
  <line x1="340" y1="48" x2="340" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ============================================================ -->
  <!-- Right panel: N_opt & D_opt Chinchilla (x: 358–658) -->
  <!-- ============================================================ -->
  <text x="508" y="54" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Chinchilla：N 与 D 等比例增长</text>

  <!-- axes -->
  <line x1="362" y1="268" x2="658" y2="268" stroke="#ccc" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="362" y1="268" x2="362" y2="60"  stroke="#ccc" stroke-width="1.4" marker-end="url(#arr2)"/>

  <!-- axis labels -->
  <text x="508" y="286" text-anchor="middle" font-size="10" fill="#888">log 计算量 C（FLOPs）</text>
  <text x="324" y="165" text-anchor="middle" font-size="10" fill="#888" transform="rotate(-90,324,165)">log 最优 N 或 D</text>

  <!-- x ticks -->
  <line x1="402" y1="268" x2="402" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="462" y1="268" x2="462" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="522" y1="268" x2="522" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="582" y1="268" x2="582" y2="272" stroke="#ccc" stroke-width="1"/>
  <line x1="642" y1="268" x2="642" y2="272" stroke="#ccc" stroke-width="1"/>
  <text x="402" y="280" text-anchor="middle" font-size="9" fill="#aaa">10¹⁸</text>
  <text x="462" y="280" text-anchor="middle" font-size="9" fill="#aaa">10¹⁹</text>
  <text x="522" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²⁰</text>
  <text x="582" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²¹</text>
  <text x="642" y="280" text-anchor="middle" font-size="9" fill="#aaa">10²²</text>

  <!-- y ticks -->
  <line x1="358" y1="230" x2="362" y2="230" stroke="#ccc" stroke-width="1"/>
  <line x1="358" y1="175" x2="362" y2="175" stroke="#ccc" stroke-width="1"/>
  <line x1="358" y1="120" x2="362" y2="120" stroke="#ccc" stroke-width="1"/>
  <text x="356" y="234" text-anchor="end" font-size="9" fill="#aaa">10⁸</text>
  <text x="356" y="179" text-anchor="end" font-size="9" fill="#aaa">10⁹</text>
  <text x="356" y="124" text-anchor="end" font-size="9" fill="#aaa">10¹⁰</text>

  <!-- grid -->
  <line x1="362" y1="230" x2="655" y2="230" stroke="#ebebeb" stroke-width="1"/>
  <line x1="362" y1="175" x2="655" y2="175" stroke="#ebebeb" stroke-width="1"/>
  <line x1="362" y1="120" x2="655" y2="120" stroke="#ebebeb" stroke-width="1"/>

  <!-- N_opt ~ C^0.5 -->
  <polyline fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="402,252 462,219 522,186 582,153 642,120"/>

  <!-- D_opt ~ C^0.5 — identical slope, shifted up ~20px to show equal-rate growth -->
  <polyline fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="402,240 462,207 522,174 582,141 642,108"/>

  <!-- "parallel = equal rate" annotation -->
  <line x1="522" y1="186" x2="522" y2="174" stroke="#555" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="528" y="183" font-size="9" fill="#555">间距恒定</text>
  <text x="528" y="193" font-size="9" fill="#555">= 等比增长</text>

  <!-- slope label -->
  <text x="647" y="118" font-size="10" fill="#4A90D9">N_opt ∝ C^0.5</text>
  <text x="647" y="106" font-size="10" fill="#E67E22">D_opt ∝ C^0.5</text>

  <!-- 20 tokens/param callout -->
  <rect x="366" y="75" width="175" height="36" rx="6" fill="#FFF8E1" stroke="#F0AD4E" stroke-width="1.5"/>
  <text x="454" y="91" text-anchor="middle" font-size="11" font-weight="600" fill="#856404">Chinchilla 法则</text>
  <text x="454" y="105" text-anchor="middle" font-size="10" fill="#856404">≈ 20 tokens / param</text>

  <!-- ============================================================ -->
  <!-- Bottom legend -->
  <!-- ============================================================ -->
  <rect x="120" y="306" width="460" height="28" rx="6" fill="white" stroke="#eee" stroke-width="1"/>
  <line x1="138" y1="320" x2="164" y2="320" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="170" y="324" font-size="10" fill="#333">Kaplan N_opt（∝ C^0.73，高估模型规模）</text>
  <line x1="390" y1="320" x2="416" y2="320" stroke="#4A90D9" stroke-width="2.5"/>
  <text x="422" y="324" font-size="10" fill="#333">Chinchilla N_opt（∝ C^0.5）</text>
  <line x1="555" y1="320" x2="581" y2="320" stroke="#E67E22" stroke-width="2.5"/>
  <text x="587" y="324" font-size="10" fill="#333">D_opt（∝ C^0.5）</text>
</svg>
