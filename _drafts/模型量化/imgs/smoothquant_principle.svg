<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <rect width="960" height="560" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">SmoothQuant：把量化难度从激活迁移到权重</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#6b7280">Y = X W  →  Y = (X / s) · (s · W)  =  X̂ Ŵ，输出不变</text>

  <defs>
    <linearGradient id="outlierGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="normalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="heavyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <marker id="bigArrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L12,5 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ═══ LEFT: Before smoothing ═══ -->
  <text x="210" y="82" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#dc2626">迁移前：激活 X 难量化</text>

  <!-- X matrix label -->
  <text x="72" y="106" font-size="11" fill="#374151" font-weight="bold">激活 X</text>

  <!-- col 0 normal -->
  <rect x="60"  y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="60"  y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="60"  y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="60"  y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="77"  y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>
  <text x="77"  y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.5</text>
  <text x="77"  y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="77"  y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>

  <!-- col 1 OUTLIER -->
  <rect x="100" y="112" width="34" height="24" fill="url(#outlierGrad)" rx="3" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="100" y="140" width="34" height="24" fill="url(#outlierGrad)" rx="3" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="100" y="168" width="34" height="24" fill="url(#outlierGrad)" rx="3" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="100" y="196" width="34" height="24" fill="url(#outlierGrad)" rx="3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="117" y="128" text-anchor="middle" font-size="9.5" fill="#7f1d1d" font-weight="bold">127</text>
  <text x="117" y="156" text-anchor="middle" font-size="9.5" fill="#7f1d1d" font-weight="bold">98</text>
  <text x="117" y="184" text-anchor="middle" font-size="9.5" fill="#7f1d1d" font-weight="bold">115</text>
  <text x="117" y="212" text-anchor="middle" font-size="9.5" fill="#7f1d1d" font-weight="bold">134</text>
  <!-- outlier label above col 1 -->
  <rect x="98"  y="98"  width="42" height="15" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="119" y="109" text-anchor="middle" font-size="9" fill="#b91c1c">异常值!</text>

  <!-- col 2 normal -->
  <rect x="140" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="140" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="140" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="140" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="157" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>
  <text x="157" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.6</text>
  <text x="157" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.1</text>
  <text x="157" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>

  <!-- col 3 normal -->
  <rect x="180" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="180" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="180" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="180" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="197" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.7</text>
  <text x="197" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.5</text>
  <text x="197" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="197" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.8</text>

  <text x="130" y="238" text-anchor="middle" font-size="11" fill="#374151">×</text>

  <!-- W matrix label -->
  <text x="295" y="106" font-size="11" fill="#374151" font-weight="bold">权重 W</text>
  <rect x="252" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="252" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="252" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="252" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="290" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="290" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="290" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="290" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="269" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="269" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.5</text>
  <text x="269" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>
  <text x="269" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>
  <text x="307" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.6</text>
  <text x="307" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.1</text>
  <text x="307" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.7</text>
  <text x="307" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>

  <!-- error box left -->
  <rect x="55" y="252" width="310" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="267" text-anchor="middle" font-size="10.5" fill="#991b1b">X 量化 scale 由最大值 134 决定</text>
  <text x="210" y="282" text-anchor="middle" font-size="10.5" fill="#b91c1c">正常值 0.3 仅占 1/447，精度几乎全部浪费</text>

  <!-- center arrow -->
  <line x1="408" y1="172" x2="476" y2="172" stroke="#374151" stroke-width="2.5" marker-end="url(#bigArrow)"/>
  <text x="442" y="162" text-anchor="middle" font-size="11" fill="#374151">÷s / ×s</text>
  <text x="442" y="186" text-anchor="middle" font-size="10" fill="#6b7280">数学等价</text>

  <!-- ═══ RIGHT: After smoothing ═══ -->
  <text x="710" y="82" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#16a34a">迁移后：X̂ 可正常量化</text>

  <!-- X-hat label -->
  <text x="510" y="106" font-size="11" fill="#374151" font-weight="bold">X̂ = X ÷ s</text>

  <!-- col 0 -->
  <rect x="500" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="500" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="500" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="500" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="517" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>
  <text x="517" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.5</text>
  <text x="517" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="517" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>

  <!-- col 1 smoothed -->
  <rect x="540" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="540" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="540" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="540" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="557" y="128" text-anchor="middle" font-size="9.5" fill="#14532d">0.95</text>
  <text x="557" y="156" text-anchor="middle" font-size="9.5" fill="#14532d">0.73</text>
  <text x="557" y="184" text-anchor="middle" font-size="9.5" fill="#14532d">0.86</text>
  <text x="557" y="212" text-anchor="middle" font-size="9.5" fill="#14532d">1.0</text>
  <!-- smooth label above col 1 -->
  <rect x="537" y="98"  width="40" height="15" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="0.8"/>
  <text x="557" y="109" text-anchor="middle" font-size="9" fill="#15803d">已平滑</text>

  <!-- col 2 -->
  <rect x="580" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="580" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="580" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="580" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="597" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>
  <text x="597" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.6</text>
  <text x="597" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.1</text>
  <text x="597" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>

  <!-- col 3 -->
  <rect x="620" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="620" y="140" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="620" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="620" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="637" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.7</text>
  <text x="637" y="156" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.5</text>
  <text x="637" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="637" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.8</text>

  <text x="578" y="238" text-anchor="middle" font-size="11" fill="#374151">×</text>

  <!-- W-hat label -->
  <text x="730" y="106" font-size="11" fill="#374151" font-weight="bold">Ŵ = s · W（离线预处理）</text>

  <!-- W-hat col 0 -->
  <rect x="700" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="700" y="140" width="34" height="24" fill="url(#heavyGrad)" rx="3" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="700" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="700" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="738" y="112" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="738" y="140" width="34" height="24" fill="url(#heavyGrad)" rx="3" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="738" y="168" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <rect x="738" y="196" width="34" height="24" fill="url(#normalGrad)" rx="3" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="717" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.2</text>
  <text x="717" y="156" text-anchor="middle" font-size="9.5" fill="#7c2d12" font-weight="bold">26.8</text>
  <text x="717" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>
  <text x="717" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.4</text>
  <text x="755" y="128" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.6</text>
  <text x="755" y="156" text-anchor="middle" font-size="9.5" fill="#7c2d12" font-weight="bold">67.0</text>
  <text x="755" y="184" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.7</text>
  <text x="755" y="212" text-anchor="middle" font-size="9.5" fill="#1e3a8a">0.3</text>
  <!-- W-hat annotation -->
  <rect x="690" y="98"  width="92" height="15" rx="3" fill="#fff7ed" stroke="#fb923c" stroke-width="0.8"/>
  <text x="736" y="109" text-anchor="middle" font-size="9" fill="#9a3412">对应行变大，per-channel 量化</text>

  <!-- result box right -->
  <rect x="495" y="252" width="450" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="720" y="267" text-anchor="middle" font-size="10.5" fill="#14532d">X̂ 最大值 ≈ 1，可低误差 INT8 量化 ✓</text>
  <text x="720" y="282" text-anchor="middle" font-size="10.5" fill="#16a34a">Ŵ 变大但固定，离线 per-channel 量化精度足够</text>

  <!-- ═══ BOTTOM: alpha explanation ═══ -->
  <!-- 整体容器：y=308, height=224，底部到 y=532 -->
  <rect x="55" y="308" width="850" height="224" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="480" y="330" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1e293b">平滑因子 s 的设计：用 α 控制转移比例</text>

  <!-- 公式与关键性质（左半，x=80~400） -->
  <text x="80" y="354" font-size="12" fill="#374151">s_j  =  max|x_j|^α  /  max|w_j|^(1−α)</text>
  <text x="80" y="373" font-size="11" fill="#6b7280">j 为通道维度（每个通道单独一个 s）</text>
  <text x="80" y="391" font-size="11" fill="#6b7280">α 控制转移程度，默认 0.5</text>

  <text x="80" y="413" font-size="11.5" fill="#374151" font-weight="bold">关键性质</text>
  <text x="80" y="431" font-size="11" fill="#6b7280">· 数学等价变换，输出 Y 完全不变</text>
  <text x="80" y="449" font-size="11" fill="#6b7280">· s·W 是离线预处理，推理时无额外开销</text>
  <text x="80" y="467" font-size="11" fill="#6b7280">· 校准数据只需几百条无标签样本</text>
  <text x="80" y="485" font-size="11" fill="#6b7280">· α = 0.5 时激活和权重各承担一半压力</text>
  <text x="80" y="503" font-size="11" fill="#6b7280">· 实测 OPT-175B：困惑度损失 &lt;0.5，吞吐 ~1.5×</text>

  <!-- 竖分隔 -->
  <line x1="430" y1="340" x2="430" y2="522" stroke="#e2e8f0" stroke-width="1"/>

  <!-- α 取值说明（右半，x=450） -->
  <!-- α = 0 -->
  <rect x="450" y="344" width="440" height="52" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="464" y="361" font-size="11.5" fill="#991b1b" font-weight="bold">α = 0：不转移（退化为原始 INT8 量化）</text>
  <text x="464" y="379" font-size="11" fill="#b91c1c">s ≈ 1，激活保持原样，异常值未处理，难量化</text>

  <!-- α = 0.5 -->
  <rect x="450" y="404" width="440" height="64" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="0.8"/>
  <text x="464" y="421" font-size="11.5" fill="#14532d" font-weight="bold">α = 0.5：平均分担（推荐默认值）</text>
  <text x="464" y="439" font-size="11" fill="#166534">s = √(max|x| · max|w|)，激活和权重各承担一半</text>
  <text x="464" y="457" font-size="11" fill="#166534">大多数模型上效果最好，无需逐层调参</text>

  <!-- α = 1 -->
  <rect x="450" y="476" width="440" height="46" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.8"/>
  <text x="464" y="493" font-size="11.5" fill="#92400e" font-weight="bold">α = 1：全部转移给权重</text>
  <text x="464" y="511" font-size="11" fill="#9a3412">激活最容易量化，但权重值可能过大，量化精度反降</text>

</svg>
