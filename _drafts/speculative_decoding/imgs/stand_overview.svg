<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <!-- Background -->
  <rect width="860" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">STAND 方法概览</text>

  <!-- ===== LEFT PANEL: N-gram module comparison ===== -->
  <rect x="28" y="52" width="378" height="330" rx="10" fill="#f0f4ff" stroke="#c5cae9" stroke-width="1.2"/>
  <text x="217" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#3d3d8f">传统 vs STAND N-gram 模块</text>

  <!-- Traditional -->
  <rect x="44" y="90" width="160" height="280" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="124" y="112" text-anchor="middle" font-size="11.5" font-weight="600" fill="#e63946">传统方法</text>
  <text x="124" y="127" text-anchor="middle" font-size="10" fill="#666">（PLD / ANPD / Token Recycle）</text>

  <!-- token table -->
  <rect x="64" y="140" width="120" height="28" rx="4" fill="#ffd6d8"/>
  <text x="84" y="159" font-size="10" fill="#333">N-gram → Token ID</text>

  <text x="124" y="190" text-anchor="middle" font-size="10" fill="#555">查找时</text>

  <rect x="64" y="200" width="120" height="28" rx="4" fill="#ffe0b2"/>
  <text x="124" y="219" text-anchor="middle" font-size="10.5" fill="#333">固定 token（确定性）</text>

  <text x="124" y="250" text-anchor="middle" font-size="10" fill="#999">↓ 问题</text>

  <rect x="64" y="260" width="120" height="80" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="124" y="278" text-anchor="middle" font-size="10" fill="#bf360c">丢失概率分布信息</text>
  <text x="124" y="294" text-anchor="middle" font-size="10" fill="#bf360c">接受率依赖 greedy</text>
  <text x="124" y="310" text-anchor="middle" font-size="10" fill="#bf360c">选择，在采样场景</text>
  <text x="124" y="326" text-anchor="middle" font-size="10" fill="#bf360c">下效果差</text>

  <!-- STAND column -->
  <rect x="210" y="90" width="176" height="280" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="298" y="112" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4361ee">STAND</text>
  <text x="298" y="127" text-anchor="middle" font-size="10" fill="#666">（Logit-based N-gram）</text>

  <!-- logit table -->
  <rect x="226" y="140" width="144" height="28" rx="4" fill="#d0d8ff"/>
  <text x="298" y="159" text-anchor="middle" font-size="10" fill="#333">N-gram → top-10 logit 分布</text>

  <text x="298" y="190" text-anchor="middle" font-size="10" fill="#555">查找时</text>

  <rect x="226" y="200" width="144" height="28" rx="4" fill="#d0f0c0"/>
  <text x="298" y="219" text-anchor="middle" font-size="10.5" fill="#333">从分布中随机采样（随机性）</text>

  <text x="298" y="250" text-anchor="middle" font-size="10" fill="#4361ee">↓ 优势</text>

  <rect x="226" y="260" width="144" height="80" rx="4" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="298" y="278" text-anchor="middle" font-size="10" fill="#1b5e20">保留概率信息</text>
  <text x="298" y="294" text-anchor="middle" font-size="10" fill="#1b5e20">对齐 LRM 采样分布</text>
  <text x="298" y="310" text-anchor="middle" font-size="10" fill="#1b5e20">接受率比确定性方法</text>
  <text x="298" y="326" text-anchor="middle" font-size="10" fill="#1b5e20">高 5-8%</text>

  <!-- ===== RIGHT PANEL: Three innovations ===== -->
  <rect x="424" y="52" width="408" height="330" rx="10" fill="#fff8f0" stroke="#ffe0b2" stroke-width="1.2"/>
  <text x="628" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#8d3b00">STAND 三大创新</text>

  <!-- Innovation 1 -->
  <rect x="440" y="90" width="376" height="82" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="448" y="112" font-size="13" font-weight="700" fill="#e65100">① Logit-based N-gram 模块</text>
  <text x="452" y="130" font-size="11" fill="#555">• 存储 top-10 token 及其概率（压缩 logit 分布）</text>
  <text x="452" y="148" font-size="11" fill="#555">• 相同 n-gram 多次出现时加权平均合并分布</text>
  <text x="452" y="164" font-size="11" fill="#555">• 内存开销恒定（仅保留 top-10）</text>

  <!-- Innovation 2 -->
  <rect x="440" y="184" width="376" height="82" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="1.2"/>
  <text x="448" y="206" font-size="13" font-weight="700" fill="#1b5e20">② Gumbel-Top-K 并行采样</text>
  <text x="452" y="224" font-size="11" fill="#555">• 树节点扩展需采样 k 个不重复 token</text>
  <text x="452" y="242" font-size="11" fill="#555">• 对 log-prob 加 Gumbel 噪声，取 top-k（无放回）</text>
  <text x="452" y="258" font-size="11" fill="#555">• 预缓存噪声，消除实时采样延迟</text>

  <!-- Innovation 3 -->
  <rect x="440" y="278" width="376" height="92" rx="8" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.2"/>
  <text x="448" y="300" font-size="13" font-weight="700" fill="#1a237e">③ 数据驱动草稿树优化</text>
  <text x="452" y="318" font-size="11" fill="#555">• 初始化 625 节点大树（深度 20）</text>
  <text x="452" y="336" font-size="11" fill="#555">• 在 30 条真实数据上追踪各节点接受率</text>
  <text x="452" y="354" font-size="11" fill="#555">• 选 top-80 节点重组为紧凑树（深度达 13，OOD 泛化）</text>

  <!-- Bottom annotation -->
  <text x="430" y="402" text-anchor="middle" font-size="11" fill="#999">注：STAND 完全无需额外模型训练，随推理轨迹数增加优势更显著（16 轨迹 vs 4 轨迹 throughput 提升 21%）</text>
</svg>
